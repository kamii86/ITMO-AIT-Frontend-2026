<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
          content="Финансовая аналитика и отчеты MyWallet. Наглядные графики расходов, динамика бюджета по месяцам и автоматический расчет ожидаемого баланса.">
    <title>Аналитика — MyWallet</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark mb-4 shadow-sm" aria-label="Верхнее меню">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="dashboard.html">MyWallet</a>
        <div class="d-flex align-items-center ms-auto">
            <a href="dashboard.html" class="nav-link-custom me-2">Главная</a>
            <a href="search.html" class="nav-link-custom me-2">Поиск</a>
            <a href="reports.html" class="nav-link-custom me-2 active" aria-current="page">Аналитика</a>
            <a href="bank.html" class="nav-link-custom me-3">Банк</a>
            <span id="userNameDisplay" class="me-3 d-none d-sm-flex text-white"></span>
            <button class="btn btn-outline-light btn-sm border-0 fw-bold" onclick="logout()">Выйти</button>
        </div>
    </div>
</nav>

<main class="container">
    <h1 class="fw-bold h3 mb-4">Аналитический отчет</h1>

    <div class="row g-4 mb-5">
        <div class="col-lg-6">
            <section class="card p-4 shadow-sm border-0 h-100">
                <h2 class="text-muted small fw-bold text-uppercase h6 mb-4">Расходы по категориям</h2>
                <div class="chart-box-fixed">
                    <canvas id="categoryChart" tabindex="0" role="button"
                            aria-label="Интерактивная диаграмма расходов по категориям"></canvas>
                </div>
            </section>
        </div>

        <div class="col-lg-6">
            <section class="card p-4 shadow-sm border-0 h-100">
                <h2 class="text-muted small fw-bold text-uppercase h6 mb-4">Доходы и расходы по месяцам</h2>
                <div class="chart-box-fixed">
                    <canvas id="monthlyChart" tabindex="0" role="button"
                            aria-label="Интерактивная диаграмма доходов и расходов"></canvas>
                </div>
            </section>
        </div>

        <div class="col-lg-12">
            <div class="card p-5 bg-dark text-white border-0 shadow-sm text-center">
                <h2 class="fw-bold mb-2 opacity-75 text-uppercase small h6">Ожидаемый баланс к концу месяца</h2>
                <div id="forecastAmount" class="display-3 fw-bold mb-0">Вычисляем...</div>
                <p class="mt-3 mb-0 opacity-50 small">Расчет произведен на основе средних трат в текущем календарном
                    периоде</p>
            </div>
        </div>
    </div>
</main>

<script>
    const user = JSON.parse(localStorage.getItem('currentUser'));
    if (!localStorage.getItem('isLoggedIn') || !user) {
        window.location.href = 'index.html';
    }

    let categoryChartInstance = null;
    let monthlyChartInstance = null;

    async function initReports() {
        try {
            const response = await fetch(`http://localhost:3000/transactions?userId=${user.id}`);
            const transactions = await response.json();
            renderCategoryChart(transactions);
            renderMonthlyChart(transactions);
            calculateForecast(transactions);
        } catch (e) {
            console.error("Ошибка загрузки данных", e);
        }
    }

    function renderCategoryChart(transactions) {
        const cats = {};
        transactions.filter(t => t.type === 'minus').forEach(t => {
            cats[t.cat] = (cats[t.cat] || 0) + parseFloat(t.sum);
        });

        if (categoryChartInstance) {
            categoryChartInstance.destroy();
        }

        categoryChartInstance = new Chart(document.getElementById('categoryChart'), {
            type: 'doughnut',
            data: {
                labels: Object.keys(cats),
                datasets: [{
                    data: Object.values(cats),
                    backgroundColor: ['#4e54c8', '#6c7d9f', '#2d3748', '#a3b1c6', '#8f94fb', '#1a202c', '#3c366b', '#4a5568'],
                    borderWidth: 2, borderColor: '#ffffff'
                }]
            },
            options: {responsive: true, maintainAspectRatio: false, plugins: {legend: {position: 'bottom'}}}
        });
    }

    function renderMonthlyChart(transactions) {
        const months = ['Янв', 'Фев', 'Мар', 'Апр', 'Май', 'Июн', 'Июл', 'Авг', 'Сен', 'Окт', 'Ноя', 'Дек'];
        const monthlyData = {};
        transactions.forEach(t => {
            const date = new Date(t.date);
            const key = `${date.getFullYear()}-${date.getMonth()}`;
            if (!monthlyData[key]) monthlyData[key] = {income: 0, expense: 0, label: months[date.getMonth()]};
            if (t.type === 'plus') monthlyData[key].income += parseFloat(t.sum);
            else monthlyData[key].expense += parseFloat(t.sum);
        });
        const sortedKeys = Object.keys(monthlyData).sort();

        if (monthlyChartInstance) {
            monthlyChartInstance.destroy();
        }

        monthlyChartInstance = new Chart(document.getElementById('monthlyChart'), {
            type: 'bar',
            data: {
                labels: sortedKeys.map(k => monthlyData[k].label),
                datasets: [
                    {label: 'Доходы', data: sortedKeys.map(k => monthlyData[k].income), backgroundColor: '#6c7d9f'},
                    {label: 'Траты', data: sortedKeys.map(k => monthlyData[k].expense), backgroundColor: '#2d3748'}
                ]
            },
            options: {responsive: true, maintainAspectRatio: false, plugins: {legend: {position: 'bottom'}}}
        });
    }

    function calculateForecast(transactions) {
        const now = new Date();
        const thisMonthTrans = transactions.filter(t => {
            const d = new Date(t.date);
            return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
        });

        const expMonth = thisMonthTrans.filter(t => t.type === 'minus').reduce((sum, t) => sum + parseFloat(t.sum), 0);
        let globalBal = 0;
        transactions.forEach(t => {
            globalBal += (t.type === 'plus' ? parseFloat(t.sum) : -parseFloat(t.sum));
        });

        const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        const forecast = globalBal - ((expMonth / now.getDate()) * (daysInMonth - now.getDate()));

        const element = document.getElementById('forecastAmount');
        if (element) {
            element.innerText = Math.round(forecast).toLocaleString() + " ₽";
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>
<script src="js/shared.js" defer></script>
<script src="js/main.js" defer></script>
</body>
</html>
