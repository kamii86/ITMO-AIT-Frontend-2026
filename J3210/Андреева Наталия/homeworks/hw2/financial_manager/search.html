<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
          content="Детальный поиск транзакций в MyWallet. Удобные фильтры по категориям, датам и суммам помогут быстро найти любые расходы или доходы.">
    <title>Поиск транзакций — MyWallet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark mb-4 shadow-sm" aria-label="Верхняя панель навигации">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="dashboard.html">MyWallet</a>
        <div class="d-flex align-items-center ms-auto">
            <a href="dashboard.html" class="nav-link-custom me-2">Главная</a>
            <a href="search.html" class="nav-link-custom me-2 active" aria-current="page">Поиск</a>
            <a href="reports.html" class="nav-link-custom me-2">Аналитика</a>
            <a href="bank.html" class="nav-link-custom me-3">Банк</a>
            <span id="userNameDisplay" class="me-3 d-none d-sm-flex text-white"></span>
            <button class="btn btn-outline-light btn-sm border-0 fw-bold" onclick="logout()">Выйти</button>
        </div>
    </div>
</nav>

<main class="container">
    <div class="card p-4 shadow-sm border-0">
        <h1 class="h4 mb-4 fw-bold">Поиск транзакций</h1>

        <form class="row g-3 mb-4" role="search" onsubmit="event.preventDefault();">

            <div class="col-12 col-md-4">
                <label for="filterCat" class="small fw-bold text-secondary mb-1 d-block">Категория</label>
                <input type="text" id="filterCat" class="form-control" placeholder="Введите название...">
            </div>

            <div class="col-12 col-md-4">
                <label for="filterSum" class="small fw-bold text-secondary mb-1 d-block">Сумма до</label>
                <input type="number" id="filterSum" class="form-control" placeholder="Напр: 5000">
            </div>

            <div class="col-12 col-md-4">
                <label for="filterDate" class="small fw-bold text-secondary mb-1 d-block">Дата операции</label>
                <input type="text" id="filterDate" class="form-control" placeholder="ГГГГ-ММ-ДД"
                       aria-describedby="dateHelp">
                <span id="dateHelp" class="visually-hidden">Введите дату в формате Год-Месяц-День</span>
            </div>

        </form>

        <div class="table-responsive">
            <table class="table table-hover align-middle" aria-label="Результаты поиска транзакций">
                <thead class="table-light">
                <tr>
                    <th scope="col">Категория</th>
                    <th scope="col">Сумма</th>
                    <th scope="col">Дата</th>
                </tr>
                </thead>
                <tbody id="transBody"></tbody>
            </table>
        </div>
    </div>
</main>

<script>
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (!localStorage.getItem('isLoggedIn') || !currentUser) {
        window.location.href = 'index.html';
    }

    async function renderTable() {
        const term = document.getElementById('filterCat').value.toLowerCase();
        const maxSum = parseFloat(document.getElementById('filterSum').value);
        const dateFilter = document.getElementById('filterDate').value;

        try {
            const response = await fetch(`http://localhost:3000/transactions?userId=${currentUser.id}`);
            const transactions = await response.json();

            const tbody = document.getElementById('transBody');
            tbody.innerHTML = '';

            transactions.filter(t =>
                (!term || t.cat.toLowerCase().includes(term)) &&
                (isNaN(maxSum) || parseFloat(t.sum) <= maxSum) &&
                (!dateFilter || t.date === dateFilter)
            ).forEach(t => {
                tbody.innerHTML += `<tr>
                    <td class="fw-bold">${t.cat}</td>
                    <td class="${t.type === 'plus' ? 'fw-bold' : 'text-danger fw-bold'}" style="${t.type === 'plus' ? 'color: #166534;' : ''}">
                        ${t.type === 'plus' ? '+' : '-'}${parseFloat(t.sum).toLocaleString()} ₽
                    </td>
                    <td>${t.date}</td>
                </tr>`;
            });
        } catch (e) {
            console.error("Ошибка при получении данных", e);
        }
    }

    document.querySelectorAll('input').forEach(i => i.addEventListener('input', renderTable));
    renderTable();
</script>
<script src="js/shared.js"></script>
<script src="js/main.js"></script>
</body>
</html>
