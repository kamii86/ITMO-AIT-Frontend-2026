<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
          content="Регистрация в финансовом менеджере MyWallet. Создайте аккаунт для удобного учета личных финансов, контроля бюджета и анализа трат.">
    <title>Регистрация нового пользователя — MyWallet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/dark-theme.css">

</head>
<body class="bg-light d-flex align-items-center min-vh-100">
<main class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-4 card p-4 shadow-sm">
            <h1 class="h3 mb-4">Регистрация</h1>

            <label for="name" class="visually-hidden">Имя</label>
            <input type="text" id="name" class="form-control mb-3" placeholder="Имя">

            <label for="surname" class="visually-hidden">Фамилия</label>
            <input type="text" id="surname" class="form-control mb-3" placeholder="Фамилия">

            <label for="email" class="visually-hidden">Email</label>
            <input type="email" id="email" class="form-control mb-3" placeholder="Email">

            <label for="pass" class="visually-hidden">Пароль</label>
            <input type="password" id="pass" class="form-control mb-4" placeholder="Пароль">

            <button id="regBtn" class="btn btn-success w-100 py-2">Зарегистрироваться</button>
            <a href="index.html" class="btn btn-outline-secondary w-100 mt-3">Назад ко входу</a>
        </div>
    </div>
</main>
<script src="js/shared.js"></script>
<script src="js/auth.js"></script>
<script src="js/theme-toggle.js"></script>
</body>
</html>
