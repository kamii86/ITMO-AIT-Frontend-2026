<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | MLShare</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>

<body class="bg-light">

    <main class="container d-flex justify-content-center align-items-center vh-100">
        
        <div class="card border-3 rounded-4" style="max-width: 400px; width: 100%;">
            <div class="card-body p-4 p-sm-5">
                <div class="text-center mb-4">
                    <h1 class="h3 fw-bold text-primary mb-1">MLShare</h1>
                </div>

                <form action="index.html">
                    <div class="mb-2">
                        <label for="emailInput" class="form-label">Email адрес</label>
                        <input type="email" class="form-control" id="emailInput" placeholder="name@example.com" required>
                    </div>

                    <div class="mb-2">
                        <label for="passwordInput" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="passwordInput" placeholder="Введите пароль" required>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label small text-muted" for="rememberMe">Запомнить меня</label>
                        </div>
                        <a href="#" class="text-decoration-none small">Забыли пароль?</a>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Войти</button>

                    <div class="text-center small text-muted">
                        Нет аккаунта? <a href="register.html" class="text-decoration-none fw-bold">Зарегистрироваться</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
