<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>Регистрация — Travel Planner</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <a class="skip-link" href="#main-content">Перейти к основному содержимому</a>
  <div id="appStatus" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>

  <header class="border-bottom bg-white">
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="index.html">Travel Planner</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
          aria-controls="mainNav"
          aria-expanded="false"
          aria-label="Переключить навигацию">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto align-items-lg-center">
            <li class="nav-item me-lg-2 mt-2 mt-lg-0">
              <button id="themeToggle" class="theme-toggle" type="button" aria-label="Переключить тему">
                <svg class="icon" aria-hidden="true">
                  <use href="assets/icons/sprite.svg#sun"></use>
                </svg>
                <span>Тема</span>
              </button>
            </li>
            <li class="nav-item"><a class="nav-link" href="search.html">Поиск</a></li>
            <li class="nav-item"><a class="nav-link" href="collaboration.html">Совместно</a></li>
            <li class="nav-item"><a class="nav-link" href="profile.html">Кабинет</a></li>
            <li class="nav-item dropdown" id="authMenuContainer">
              <a class="nav-link dropdown-toggle active" href="#" id="authMenuLink" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                Вход
              </a>
              <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="authMenuLink" id="authDropdownMenu">
                <li><a class="dropdown-item" href="login.html">Войти</a></li>
                <li><a class="dropdown-item" href="register.html">Регистрация</a></li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main id="main-content" class="container page-shell py-5">
    <div class="auth-layout">
      <div class="auth-card">
        <span class="page-kicker">Создание аккаунта</span>
        <h1 class="page-title">Регистрация</h1>
        <p class="page-subtitle mb-4">
          Создайте аккаунт, чтобы сохранять маршруты, заметки и делиться планами поездок.
        </p>

        <form id="registerForm">
          <div class="mb-3">
            <label for="registerName" class="form-label">Имя</label>
            <input
              type="text"
              class="form-control"
              id="registerName"
              placeholder="Введите имя"
              autocomplete="name"
              required>
          </div>

          <div class="mb-3">
            <label for="registerEmail" class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              id="registerEmail"
              placeholder="name@example.com"
              autocomplete="email"
              required>
          </div>

          <div class="mb-3">
            <label for="registerPassword" class="form-label">Пароль</label>
            <input
              type="password"
              class="form-control"
              id="registerPassword"
              placeholder="Введите пароль"
              autocomplete="new-password"
              required>
          </div>

          <div class="mb-4">
            <label for="registerPassword2" class="form-label">Повторите пароль</label>
            <input
              type="password"
              class="form-control"
              id="registerPassword2"
              placeholder="Повторите пароль"
              autocomplete="new-password"
              required>
          </div>

          <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
        </form>

        <hr class="my-4">

        <p class="mb-0 small">
          Уже есть аккаунт?
          <a href="login.html">Войти</a>
        </p>
      </div>
    </div>
  </main>

  <footer class="border-top py-3">
    <div class="container small text-muted">© Travel Planner, ЛР2</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
