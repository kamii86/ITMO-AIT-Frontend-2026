<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Вход — Travel Planner</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <header class="border-bottom bg-white">
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="index.html">Travel Planner</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
          aria-controls="mainNav"
          aria-expanded="false"
          aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="search.html">Поиск</a></li>
            <li class="nav-item"><a class="nav-link" href="collaboration.html">Совместно</a></li>
            <li class="nav-item"><a class="nav-link" href="profile.html">Кабинет</a></li>
            <li class="nav-item"><a class="nav-link active" href="login.html">Вход</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="container auth-layout py-5">
    <div class="auth-card">
      <span class="page-kicker">Авторизация</span>
      <h1 class="page-title">Вход</h1>
      <p class="page-subtitle mb-4">Войдите, чтобы сохранять маршруты, заметки и подборки направлений.</p>

      <form>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Пароль</label>
          <input type="password" class="form-control" id="password" placeholder="Введите пароль" required>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label" for="rememberMe">
              Запомнить меня
            </label>
          </div>
          <a href="#" class="link-secondary small">Забыли пароль?</a>
        </div>

        <button type="submit" class="btn btn-primary w-100">Войти</button>
      </form>

      <hr class="my-4">

      <p class="mb-0 small">
        Нет аккаунта?
        <a href="register.html">Зарегистрироваться</a>
      </p>
    </div>
  </main>

  <footer class="border-top py-3">
    <div class="container small text-muted">© Travel Planner, ЛР1</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
