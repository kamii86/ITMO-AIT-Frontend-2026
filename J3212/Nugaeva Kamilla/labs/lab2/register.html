<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Регистрация — Travel Planner</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <header class="border-bottom bg-white">
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="index.html">Travel Planner</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
          aria-controls="mainNav"
          aria-expanded="false"
          aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="search.html">Поиск</a></li>
            <li class="nav-item"><a class="nav-link" href="collaboration.html">Совместно</a></li>
            <li class="nav-item"><a class="nav-link" href="profile.html">Кабинет</a></li>
            <li class="nav-item dropdown" id="authMenuContainer">
              <a class="nav-link dropdown-toggle" href="#" id="authMenuLink" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                Вход
              </a>
              <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="authMenuLink" id="authDropdownMenu">
                <li><a class="dropdown-item" href="login.html">Войти</a></li>
                <li><a class="dropdown-item" href="register.html">Регистрация</a></li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="container auth-layout py-5">
    <div class="auth-card">
      <span class="page-kicker">Новый аккаунт</span>
      <h1 class="page-title">Регистрация</h1>
      <p class="page-subtitle mb-4">Создайте аккаунт, чтобы сохранять маршруты и заметки по поездкам.</p>

      <form id="registerForm">
        <div class="mb-3">
          <label for="registerName" class="form-label">Имя</label>
          <input type="text" class="form-control" id="registerName" placeholder="Например, Камилла" required>
        </div>

        <div class="mb-3">
          <label for="registerEmail" class="form-label">Email</label>
          <input type="email" class="form-control" id="registerEmail" placeholder="name@example.com" required>
        </div>

        <div class="mb-3">
          <label for="registerPassword" class="form-label">Пароль</label>
          <input type="password" class="form-control" id="registerPassword" placeholder="Придумайте пароль" required>
        </div>

        <div class="mb-3">
          <label for="registerPassword2" class="form-label">Повторите пароль</label>
          <input type="password" class="form-control" id="registerPassword2" placeholder="Повторите пароль" required>
        </div>

        <div class="form-check mb-4">
          <input class="form-check-input" type="checkbox" id="agree" required>
          <label class="form-check-label" for="agree">
            Я согласен(на) с условиями использования
          </label>
        </div>

        <button type="submit" class="btn btn-primary w-100">Создать аккаунт</button>
      </form>

      <hr class="my-4">

      <p class="mb-0 small">
        Уже есть аккаунт?
        <a href="login.html">Войти</a>
      </p>
    </div>
  </main>

  <footer class="border-top py-3">
    <div class="container small text-muted">© Travel Planner, ЛР2</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
